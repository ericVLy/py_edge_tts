name: Build and Release EXE

# 触发条件：当向 master 分支推送代码，或者创建了以 v 开头的标签（如 v1.0.0）时触发
on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest  # 使用 Windows 虚拟环境（打包 exe 必须在 Windows 下进行）

    steps:
    # 1. 拉取仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境 (这里指定 3.10)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖（只安装程序需要的库，保证打包体积最小）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts beautifulsoup4 pyinstaller

    # 4. 执行 PyInstaller 打包
    - name: Build with PyInstaller
      run: |
        pyinstaller -F -w --hidden-import=bs4.builder._htmlparser tts_tool.py

    # 5. （可选）测试生成的 exe 是否存在
    - name: Verify build artifact
      run: |
        if (Test-Path "dist/tts_tool.exe") { echo "Build Success!" } else { exit 1 }

    # 6. 上传生成的 exe 作为 GitHub Artifacts（可在 Actions 页面直接下载）
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tts_tool_windows_exe
        path: dist/tts_tool.exe

    # 7. 如果是因为推送到标签触发，则自动发布到 Release 页面
    - name: Create Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/tts_tool.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}