name: Cross-Platform Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 矩阵配置：同时在三个平台上运行
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: tts_tool_windows.exe
            asset_name: tts_tool_windows.exe
          - os: ubuntu-latest
            artifact_name: dist/tts_tool_linux  # Linux 生成的是无后缀二进制文件
            asset_name: tts_tool_linux
          - os: macos-latest
            artifact_name: dist/tts_tool_macos  # Mac 默认也生成二进制，这里暂不打包成 .app
            asset_name: tts_tool_macos

    steps:
    # 1. 拉取代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖 (Linux 环境下 Tkinter 需要系统级依赖，这里做了特殊处理)
    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts beautifulsoup4 pyinstaller

    # 4. 执行 PyInstaller 打包
    # Windows 环境单独处理隐藏导入，Mac/Linux 使用通用命令
    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller -F -w --hidden-import=bs4.builder._htmlparser tts_tool.py
        mv dist/tts_tool.exe ${{ matrix.artifact_name }}

    - name: Build with PyInstaller (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller -F -w --hidden-import=bs4.builder._htmlparser tts_tool.py
        # 重命名生成的二进制文件方便后续区分
        mv dist/tts_tool ${{ matrix.artifact_name }}

    # 5. 上传当前平台的 Artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.artifact_name }}

    # 6. 自动发布到 Release 页面 (如果是 tag 触发)
    - name: Create Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}